schemaVersion: 2.2.0
metadata:
  name: redhat-techs
components:
  - name: tooling-container
    container:
      image: quay.io/david_martini/devspaces:aap
      memoryRequest: 256M
      memoryLimit: 6Gi
      cpuRequest: 250m
      cpuLimit: 2000m
      args: ['tail', '-f', '/dev/null']
      env:
        - name: KUBEDOCK_ENABLED
          value: "true"