---
- name: Subscribe RHEL system
  hosts: all
  gather_facts: yes
  collections:
    - redhat.redhat.rhel_system_roles
  vars:
    rhc_auth:
      login:
        username: "{{ lookup('env', 'RHSM_USER') }}"
        password: "{{ lookup('env', 'RHSM_PASSWORD') }}"
      rhc_state: absent
      rhc_insights:
        state: absent
  roles:
    - redhat.rhel_system_roles.rhc
